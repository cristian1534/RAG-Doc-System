<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Document System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(0);
        }
      }
      @keyframes slideOut {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(100%);
        }
      }
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }
      .gradient-bg {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .hover-scale {
        transition: transform 0.2s ease;
      }
      .hover-scale:hover {
        transform: scale(1.02);
      }
      .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toast {
        min-width: 300px;
        padding: 16px;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        animation: slideIn 0.3s ease-out;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .toast.hiding {
        animation: slideOut 0.3s ease-out forwards;
      }
      .toast-success {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
      }
      .toast-error {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
      }
      .toast-warning {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white;
      }
      .toast-info {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
      }
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.2s ease-out;
      }
      .modal {
        background: white;
        border-radius: 12px;
        padding: 24px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        animation: fadeIn 0.3s ease-out;
      }
      .modal-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .modal-title {
        font-size: 18px;
        font-weight: 600;
        color: #1f2937;
      }
      .modal-message {
        color: #6b7280;
        margin-bottom: 20px;
        line-height: 1.5;
      }
      .modal-buttons {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
      }
      .btn-modal {
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
      }
      .btn-modal-primary {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
      }
      .btn-modal-primary:hover {
        background: linear-gradient(135deg, #dc2626, #b91c1c);
      }
      .btn-modal-secondary {
        background: #f3f4f6;
        color: #6b7280;
      }
      .btn-modal-secondary:hover {
        background: #e5e7eb;
      }
    </style>
  </head>
  <body class="min-h-screen gradient-bg">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
      <!-- Header -->
      <header class="text-center mb-10 fade-in">
        <h1 class="text-5xl font-bold text-white mb-3 drop-shadow-lg">
          <i class="fas fa-brain mr-3"></i>RAG Document System
        </h1>
        <p class="text-white/80 text-lg">
          Upload documents and query them with AI
        </p>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Upload Section -->
        <div class="glass-effect rounded-2xl p-6 shadow-xl hover-scale fade-in">
          <div class="flex items-center mb-4">
            <i class="fas fa-upload text-purple-600 text-xl mr-3"></i>
            <h2 class="text-2xl font-semibold text-gray-800">
              Upload Document
            </h2>
          </div>
          <div class="space-y-4">
            <div class="relative">
              <input
                type="file"
                id="fileInput"
                accept=".pdf,.docx,.txt"
                class="w-full px-4 py-3 border-2 border-dashed border-purple-300 rounded-lg focus:border-purple-500 focus:outline-none transition-colors file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100"
              />
            </div>
            <button
              onclick="uploadDocument()"
              id="uploadButton"
              class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 px-6 rounded-lg font-semibold hover:from-purple-700 hover:to-indigo-700 transition-all duration-200 shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <i class="fas fa-cloud-upload-alt mr-2"></i>Upload
            </button>
            <div id="uploadResponse" class="mt-4"></div>
          </div>
        </div>

        <!-- Documents Management Section -->
        <div class="glass-effect rounded-2xl p-6 shadow-xl hover-scale fade-in">
          <div class="flex items-center mb-4">
            <i class="fas fa-folder-open text-purple-600 text-xl mr-3"></i>
            <h2 class="text-2xl font-semibold text-gray-800">
              Manage Documents
            </h2>
          </div>
          <button
            onclick="loadDocuments()"
            id="documentButton"
            class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white py-3 px-6 rounded-lg font-semibold hover:from-blue-700 hover:to-cyan-700 transition-all duration-200 shadow-lg hover:shadow-xl"
          >
            <i class="fas fa-list mr-2"></i>Show Documents
          </button>
          <div id="documentList" class="mt-4" style="display: none"></div>
        </div>

        <!-- Query Section -->
        <div class="glass-effect rounded-2xl p-6 shadow-xl hover-scale fade-in">
          <div class="flex items-center mb-4">
            <i class="fas fa-comments text-purple-600 text-xl mr-3"></i>
            <h2 class="text-2xl font-semibold text-gray-800">
              Query Documents
            </h2>
          </div>
          <div class="space-y-4">
            <textarea
              id="queryInput"
              placeholder="Enter your question about the uploaded documents..."
              class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:outline-none transition-colors resize-none h-32"
            ></textarea>
            <button
              onclick="queryDocuments()"
              id="queryButton"
              class="w-full bg-gradient-to-r from-green-600 to-emerald-600 text-white py-3 px-6 rounded-lg font-semibold hover:from-green-700 hover:to-emerald-700 transition-all duration-200 shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <i class="fas fa-search mr-2"></i>Query
            </button>
            <div id="queryResponse" class="mt-4"></div>
          </div>
        </div>

        <!-- History Section -->
        <div class="glass-effect rounded-2xl p-6 shadow-xl hover-scale fade-in">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center">
              <i class="fas fa-history text-purple-600 text-xl mr-3"></i>
              <h2 class="text-2xl font-semibold text-gray-800">
                Query History
              </h2>
            </div>
          </div>
          <div class="flex gap-3">
            <button
              onclick="loadHistory()"
              id="historyButton"
              class="flex-1 bg-gradient-to-r from-orange-600 to-red-600 text-white py-3 px-6 rounded-lg font-semibold hover:from-orange-700 hover:to-red-700 transition-all duration-200 shadow-lg hover:shadow-xl"
            >
              <i class="fas fa-clock mr-2"></i>Show History
            </button>
            <button
              onclick="clearHistory()"
              id="clearHistoryButton"
              class="bg-gradient-to-r from-red-600 to-pink-600 text-white py-3 px-6 rounded-lg font-semibold hover:from-red-700 hover:to-pink-700 transition-all duration-200 shadow-lg hover:shadow-xl"
            >
              <i class="fas fa-trash-alt mr-2"></i>Clear
            </button>
          </div>
          <div id="historyResponse" class="mt-4" style="display: none"></div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="text-center mt-12 text-white/70 text-sm">
        <p>Powered by FastAPI & Ollama • Built with ❤️</p>
      </footer>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/app.js"></script>
  </body>
</html>
